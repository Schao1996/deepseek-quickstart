<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代五子棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.8rem;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .status {
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding: 12px 24px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            display: inline-block;
            border: 1px solid #475569;
        }
        .board-container {
            position: relative;
            margin: 0 auto 30px;
            width: fit-content;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #1c1917;
            border-radius: 12px;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 14px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #undo {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        #undo:hover { background: linear-gradient(135deg, #d97706, #b45309); transform: translateY(-3px); }
        #restart {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        #restart:hover { background: linear-gradient(135deg, #059669, #047857); transform: translateY(-3px); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #475569;
            animation: pop 0.4s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        #modalRestart {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
        }
        #modalRestart:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        footer {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>五子棋 · Gomoku</h1>
        <div class="status" id="status">黑方回合</div>
        <div class="board-container">
            <canvas id="board" width="600" height="600"></canvas>
        </div>
        <div class="controls">
            <button id="undo">悔棋</button>
            <button id="restart">重新开始</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="winTitle">胜利！</h2>
            <p id="winMessage">黑方获胜！</p>
            <button id="modalRestart">再来一局</button>
        </div>
    </div>

    <footer>© 2023 现代五子棋 | 双人对战</footer>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const undoBtn = document.getElementById('undo');
        const restartBtn = document.getElementById('restart');
        const winModal = document.getElementById('winModal');
        const winTitle = document.getElementById('winTitle');
        const winMessage = document.getElementById('winMessage');
        const modalRestart = document.getElementById('modalRestart');

        const GRID_SIZE = 15;
        const CELL_SIZE = canvas.width / (GRID_SIZE + 1);
        const PIECE_RADIUS = CELL_SIZE * 0.4;
        let board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let currentPlayer = 1;
        let gameOver = false;
        let moveHistory = [];

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#92400e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const x = (i + 1) * CELL_SIZE;
                    const y = (j + 1) * CELL_SIZE;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#d6d3d1';
                    ctx.fill();
                }
            }
            ctx.strokeStyle = '#a8a29e';
            ctx.lineWidth = 1.2;
            for (let i = 0; i < GRID_SIZE; i++) {
                const pos = (i + 1) * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(CELL_SIZE, pos);
                ctx.lineTo(canvas.width - CELL_SIZE, pos);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos, CELL_SIZE);
                ctx.lineTo(pos, canvas.height - CELL_SIZE);
                ctx.stroke();
            }
        }

        function drawPiece(x, y, player) {
            const px = (x + 1) * CELL_SIZE;
            const py = (y + 1) * CELL_SIZE;
            const gradient = ctx.createRadialGradient(px - 5, py - 5, 1, px, py, PIECE_RADIUS);
            if (player === 1) {
                gradient.addColorStop(0, '#000000');
                gradient.addColorStop(1, '#333333');
            } else {
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(1, '#cccccc');
            }
            ctx.beginPath();
            ctx.arc(px, py, PIECE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowColor = player === 1 ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fill();
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        function drawAllPieces() {
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        drawPiece(i, j, board[i][j]);
                    }
                }
            }
        }

        function checkWin(x, y, player) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx, dy] of dirs) {
                let count = 1;
                for (let step = 1; step < 5; step++) {
                    const nx = x + dx * step, ny = y + dy * step;
                    if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE || board[nx][ny] !== player) break;
                    count++;
                }
                for (let step = 1; step < 5; step++) {
                    const nx = x - dx * step, ny = y - dy * step;
                    if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE || board[nx][ny] !== player) break;
                    count++;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function handleClick(e) {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const col = Math.round(x / CELL_SIZE) - 1;
            const row = Math.round(y / CELL_SIZE) - 1;
            if (col >= 0 && col < GRID_SIZE && row >= 0 && row < GRID_SIZE && board[col][row] === 0) {
                board[col][row] = currentPlayer;
                moveHistory.push([col, row]);
                drawAllPieces();
                if (checkWin(col, row, currentPlayer)) {
                    gameOver = true;
                    winTitle.textContent = '恭喜获胜！';
                    winMessage.textContent = `${currentPlayer === 1 ? '黑方' : '白方'} 获胜！`;
                    winModal.style.display = 'flex';
                } else {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    statusText.textContent = `${currentPlayer === 1 ? '黑方' : '白方'}回合`;
                }
            }
        }

        function undo() {
            if (gameOver || moveHistory.length === 0) return;
            const [col, row] = moveHistory.pop();
            board[col][row] = 0;
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            statusText.textContent = `${currentPlayer === 1 ? '黑方' : '白方'}回合`;
            drawBoard();
            drawAllPieces();
        }

        function restart() {
            board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            currentPlayer = 1;
            gameOver = false;
            moveHistory = [];
            statusText.textContent = '黑方回合';
            drawBoard();
            winModal.style.display = 'none';
        }

        undoBtn.addEventListener('click', undo);
        restartBtn.addEventListener('click', restart);
        modalRestart.addEventListener('click', restart);
        canvas.addEventListener('click', handleClick);

        drawBoard();
    </script>
</body>
</html>
